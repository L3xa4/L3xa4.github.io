<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport"
            content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <title>Taxi</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap');
            

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }


            body {
                font-family: IBMPlexMono , Helvetica, sans-serif;
                font-weight: 200;
                color: var(--tg-theme-text-color);
                background: var(--tg-theme-bg-color);
            }


            #main {
                display: block;
                width: 100%;
                padding: 20px;
                text-align: center;
            }


            h1 {
                margin-top: 50px;
                margin-bottom: 10px;
            }


            button {
                border: 0;
                border-radius: 5px;
                margin-top: 50px;
                height: 60px;
                width: 200px;
                font-size: 20px;
                font-weight: 500;
                cursor: pointer;
                transition: all 500ms ease;
                color: var(--tg-theme-button-color);
                background: var(--tg-theme-button-text-color);
            }


            button:hover {
                background: var(--tg-theme-secondary-bg-color);
            }
            

            input {
                width: 90%;
                outline: none;
                margin: 10px 5%;
                padding: 15px 10px;
                font-size: 14px;
                border: 2px solid silver;
                border-radius: 5px;
            }


            input:focus {
                border-color: #5d5fdb;
            }


            #form {
                display: none;
                text-align: center;
            }


            #driver_page {
                display: none;
                text-align: center;
            }


            #passanger_page {
                display: none;
                text-align: center;
            }


            select {
                width: 90%;
                outline: none;
                margin: 10px 5%;
                padding: 15px 10px;
                font-size: 14px;
                border: 2px solid silver;
                border-radius: 5px;
                color: var(--tg-theme-button-color);
                background: var(--tg-theme-button-text-color);
            }

        </style>
    </head>
    <body>
        <div id="main">
            <h1>Такси от двфу</h1>
            <input type="text" placeholder="name" id="user_name">
            <button id="driver">Водитель</button>
            <button id="passanger">Пассажир</button>
            
        </div>
        <div id="passanger_page">
            <h1>Страница пассажира</h1>
            <select name="Списко водителей" id="drivers_list">
                <!-- <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option> -->
            </select>
        </div>
        <div id="driver_page">
            <h1>Страница водителя</h1>
            <button id="test">Создать комнату</button>
        </div>
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <script>
            let tg = window.Telegram.WebApp;
            let passanger_btn = document.getElementById("passanger")
            let driver_btn = document.getElementById("driver")

            document.getElementById("user_name").value = tg.initDataUnsafe.first_name;

            passanger_btn.addEventListener("click", () => {
                document.getElementById("main").style.display = "none";
                document.getElementById("passanger_page").style.display = "block";
            });
            
            driver_btn.addEventListener("click", () => {
                document.getElementById("main").style.display = "none";
                document.getElementById("driver_page").style.display = "block";
            });

            const listOptions = ["1 водитель", "2 водитель", "3 водитель"];
            document.getElementById("drivers_list").size = listOptions.length;
            for (let i = 0; i < listOptions.length; i++) {
                const option = document.createElement("option");
                option.value = listOptions[i];
                option.text = listOptions[i];
                document.getElementById("drivers_list").add(option);
            }
        </script>
    </body>
</html>
